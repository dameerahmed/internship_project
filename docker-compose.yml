version: '3.8'

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:15-alpine
    container_name: webhook_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-internship_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway_network

  # --- Redis (Cache & Lock Manager) ---
  redis:
    image: redis:7-alpine
    container_name: webhook_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway_network

  # --- RabbitMQ (Message Broker for Celery) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: webhook_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gateway_network

  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webhook_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SECRET_KEY: ${SECRET_KEY}
      SYSTEM_PRIVATE_KEY: ${SYSTEM_PRIVATE_KEY}
      SYSTEM_PUBLIC_KEY: ${SYSTEM_PUBLIC_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      COOKIE_SECURE: ${COOKIE_SECURE}
    volumes:
      # Map the local backend folder inside the container for live reloading
      - ./backend:/app/backend
    command: sh -c "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway_network

  # --- Celery Background Worker ---
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webhook_celery_worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SECRET_KEY: ${SECRET_KEY}
      SYSTEM_PRIVATE_KEY: ${SYSTEM_PRIVATE_KEY}
      SYSTEM_PUBLIC_KEY: ${SYSTEM_PUBLIC_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      COOKIE_SECURE: ${COOKIE_SECURE}
    volumes:
      # Map the local backend folder inside the container for worker live reloading
      - ./backend:/app/backend
    command: celery -A backend.app.services.celery_worker.celery_app worker --loglevel=info -B
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway_network

  # --- Frontend Nginx Server ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webhook_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - gateway_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  gateway_network:
    driver: bridge
